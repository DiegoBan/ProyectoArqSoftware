services:
  db:
    build:
      context: ./DB
      dockerfile: Dockerfile
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: colocolo
      POSTGRES_DB: db
    ports:
      - "5432:5432"
  bus:
    image: jrgiadach/soabus:v1
    container_name: bus
    restart: unless-stopped
    ports:
      - "5000:5000"
  usuario:
    image: python:3.10-slim
    container_name: servicio_usuario
    environment:
      - PYTHONUNBUFFERED=1
    volumes: 
      - ./Usuarios:/app
    working_dir: /app
    command: python usuarios.py
    depends_on:
      - bus
    